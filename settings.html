<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <style>
    body { font-family: Arial; padding: 15px; }
    input, button { width: 100%; padding: 10px; margin-top: 8px; }
    .box { border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<h2>Settings ⚙️</h2>
<a href="index.html">Home</a>

<div class="box">

<p><b>Your Username</b></p>

<input id="name" placeholder="Enter username">
<button onclick="saveName()">Save</button>

<p id="status"></p>

</div>

<script>
function saveName(){
  const name = document.getElementById("name").value;

  if(!name){
    alert("Enter a username");
    return;
  }

  localStorage.setItem("edu_user", name);

  document.getElementById("status").innerText =
    "Saved as: " + name;
}

// load saved name
window.onload = function(){
  const saved = localStorage.getItem("edu_user");

  if(saved){
    document.getElementById("name").value = saved;
    document.getElementById("status").innerText =
      "Current user: " + saved;
  }
}
</script>

</body>
</html>
