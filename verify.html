<!DOCTYPE html>
<html>
<head>
  <title>EduChat Verification</title>
  <style>
    body { font-family: Arial; padding: 15px; }
    input, button { width: 100%; padding: 10px; margin-top: 8px; }
    .box { border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<h2>Verification System 💰</h2>
<a href="index.html">Home</a>

<div class="box">

<p><b>Fee:</b> R20</p>

<input id="name" placeholder="Username">
<input id="proof" placeholder="Proof of payment (reference or screenshot link)">

<button onclick="submitRequest()">Submit Verification</button>

<p id="msg"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBV6Oq0lK6vbHzWAbaHRQDy3XgQ1K99OPM",
  authDomain: "educhat-c05b4.firebaseapp.com",
  databaseURL: "https://educhat-c05b4-default-rtdb.firebaseio.com",
  projectId: "educhat-c05b4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function submitRequest(){

  const name = document.getElementById("name").value.trim();
  const proof = document.getElementById("proof").value.trim();

  if(!name || !proof){
    document.getElementById("msg").innerText = "Please fill all fields";
    return;
  }

  db.ref("verificationRequests").push({
    username: name,
    proofPayment: proof,
    status: "pending",
    time: new Date().toLocaleString()
  });

  document.getElementById("msg").innerText =
    "Request sent! Waiting for approval.";

  document.getElementById("name").value = "";
  document.getElementById("proof").value = "";
}
</script>

</body>
</html>
