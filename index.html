<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduChat</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h2>EduChat</h2>

        <span id="myName"></span>

    </div>

    <div id="messages" class="messages">

    </div>

    <div class="bottom">

        <input
            id="message"
            type="text"
            placeholder="Type a message...">

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
