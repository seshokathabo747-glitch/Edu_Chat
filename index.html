<!DOCTYPE html>
<html>
<head>
  <title>EduChat</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    #header {
      background: #2b6cff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    #chat {
      height: 70vh;
      overflow-y: scroll;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      max-width: 70%;
      clear: both;
    }

    .me {
      background: #2b6cff;
      color: white;
      float: right;
    }

    .other {
      background: #ddd;
      float: left;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: white;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #2b6cff;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div id="header">EduChat</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="message" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "educhat-c05b4.firebaseapp.com",
  databaseURL: "https://educhat-c05b4-default-rtdb.firebaseio.com",
  projectId: "educhat-c05b4",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Save username once
let name = localStorage.getItem("name");

if (!name) {
  name = prompt("Enter your name:");
  localStorage.setItem("name", name);
}

// Send message
function sendMessage() {
  const msg = document.getElementById("message").value;

  if (msg === "") return;

  db.ref("messages").push({
    name: name,
    text: msg,
    time: new Date().toLocaleTimeString()
  });

  document.getElementById("message").value = "";
}

// Load messages
db.ref("messages").on("child_added", function(snapshot) {
  const data = snapshot.val();

  const div = document.createElement("div");
  div.classList.add("msg");

  if (data.name === name) {
    div.classList.add("me");
    div.innerHTML = `<b>You</b><br>${data.text}<br><small>${data.time}</small>`;
  } else {
    div.classList.add("other");
    div.innerHTML = `<b>${data.name}</b><br>${data.text}<br><small>${data.time}</small>`;
  }

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
});
</script>

</body>
</html>
