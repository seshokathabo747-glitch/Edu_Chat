<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST Calculator App - Thabo Seshoka</title>
<meta name="description" content="ST Calculator App by Thabo Seshoka - simple online calculator using HTML, CSS, and JavaScript">
<meta name="keywords" content="Thabo Seshoka, Calculator, Online Calculator, JS Calculator">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }
    header {
        width: 100%;
        background: #4CAF50;
        color: white;
        text-align: center;
        padding: 15px 0;
        font-size: 24px;
        font-weight: bold;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .calculator {
        margin-top: 90px; /* leave space for header */
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
        width: 300px;
        text-align: center;
    }
    input {
        width: 90%;
        padding: 10px;
        margin-bottom: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button {
        padding: 10px 20px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover { background-color: #45a049; }
    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-top: 10px;
    }
    .buttons button.operator { background-color: #f39c12; }
    .buttons button.operator:hover { background-color: #e67e22; }
    .buttons button.clear { background-color: #e74c3c; }
    .buttons button.clear:hover { background-color: #c0392b; }
</style>
</head>
<body>

<header>ST Calculator App</header>

<div class="calculator">
    <h1>Thabo Seshoka Calculator</h1>
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('/')">/</button>
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('*')">*</button>
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        <button class="clear" onclick="clearDisplay()" style="grid-column: span 4;">Clear</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    let currentInput = '';

    function appendNumber(num) {
        currentInput += num;
        display.value = currentInput;
    }

    function appendOperator(op) {
        if(currentInput === '') return;
        currentInput += op;
        display.value = currentInput;
    }

    function calculate() {
        try {
            display.value = eval(currentInput);
            currentInput = display.value;
        } catch {
            display.value = 'Error';
            currentInput = '';
        }
    }

    function clearDisplay() {
        currentInput = '';
        display.value = '';
    }
</script>

</body>
</html>
