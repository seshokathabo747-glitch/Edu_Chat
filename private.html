<!DOCTYPE html>
<html>
<head>
  <title>Private Chat</title>
</head>
<body>

<h2>Private Chat 🔒</h2>
<a href="index.html">Home</a>

<input id="me" placeholder="Your name">
<input id="to" placeholder="Send to">
<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>

<div id="chat"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBV6Oq0lK6vbHzWAbaHRQDy3XgQ1K99OPM",
  authDomain: "educhat-c05b4.firebaseapp.com",
  databaseURL: "https://educhat-c05b4-default-rtdb.firebaseio.com",
  projectId: "educhat-c05b4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function send(){
  let room = me.value + "_" + to.value;

  db.ref("private/" + room).push({
    from: me.value,
    text: msg.value,
    time: new Date().toLocaleTimeString()
  });

  msg.value="";
}
</script>

</body>
</html>
